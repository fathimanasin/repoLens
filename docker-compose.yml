services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-repolens}
      POSTGRES_USER: ${POSTGRES_USER:-repolens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-repolens}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-repolens} -d ${POSTGRES_DB:-repolens}"]
      interval: 5s
      timeout: 5s
      retries: 10

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-repolens_password}
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u ${NEO4J_USER:-neo4j} -p ${NEO4J_PASSWORD:-repolens_password} 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./apps/backend
    environment:
      NODE_ENV: development
      PORT: 3001
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      DATABASE_URL: postgresql://${POSTGRES_USER:-repolens}:${POSTGRES_PASSWORD:-repolens}@postgres:5432/${POSTGRES_DB:-repolens}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change_me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_too}
      ANALYSIS_WORKER_URL: http://analysis-worker:8001
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-placeholder}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-placeholder}
      GITHUB_CALLBACK_URL: ${GITHUB_CALLBACK_URL:-http://localhost:3001/api/auth/github/callback}
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    volumes:
      - ./apps/backend:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    command: sh -c "npx prisma generate && npm run start:dev"

  analysis-worker:
    build: ./apps/analysis-worker
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-repolens}:${POSTGRES_PASSWORD:-repolens}@postgres:5432/${POSTGRES_DB:-repolens}
      REDIS_URL: redis://redis:6379/0
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-repolens_password}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-placeholder}
    ports:
      - "${ANALYSIS_WORKER_PORT:-8001}:8001"
    volumes:
      - ./apps/analysis-worker:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  analysis-celery-worker:
    build: ./apps/analysis-worker
    command: celery -A worker worker --loglevel=info

    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-repolens}:${POSTGRES_PASSWORD:-repolens}@postgres:5432/${POSTGRES_DB:-repolens}
      REDIS_URL: redis://redis:6379/0
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-repolens_password}

    volumes:
      - ./apps/analysis-worker:/app

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  frontend:
    build: ./apps/frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-/api}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./apps/frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  neo4j_data:
  redis_data:
  backend_node_modules:
  frontend_node_modules:
